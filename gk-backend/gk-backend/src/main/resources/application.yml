spring:
  # 数据库连接配置
  datasource:
    # 这里的 3306 是 MySQL 默认端口，gk_db 是数据库名
    url: jdbc:mysql://localhost:3306/gk_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    # 这里填写你本地 MySQL 的账号，通常是 root
    username: root
    # 这里填写你本地 MySQL 的登录密码（务必改对，否则连不上）
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

# 设置后端运行的端口
server:
  port: 8080